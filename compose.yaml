# Online PKI services only. The offline root CA is not a long-running service.
# See offline-ca/, ADR-0001, ADR-0002, ADR-0004, and ADR-0005 in my-cloud.
#
# Bring up: docker compose up -d
# Docs:     issuing-ca/getting-started.md

name: my-cloud-pki

services:
  ejbca-database:
    image: postgres:16
    container_name: my-cloud-pki-ejbca-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EJBCA_DB_NAME:-ejbca}
      POSTGRES_USER: ${EJBCA_DB_USER:-ejbca}
      POSTGRES_PASSWORD: ${EJBCA_DB_PASSWORD}
    volumes:
      - ./issuing-ca/data/postgres:/var/lib/postgresql/data
    networks:
      - pki-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ejbca:
    image: keyfactor/ejbca-ce:${EJBCA_IMAGE_TAG:-latest}
    container_name: my-cloud-pki-ejbca
    hostname: ${EJBCA_HOSTNAME:-ejbca}
    restart: unless-stopped
    depends_on:
      ejbca-database:
        condition: service_healthy
    environment:
      DATABASE_JDBC_URL: jdbc:postgresql://ejbca-database:5432/${EJBCA_DB_NAME:-ejbca}
      DATABASE_USER: ${EJBCA_DB_USER:-ejbca}
      DATABASE_PASSWORD: ${EJBCA_DB_PASSWORD}
      LOG_LEVEL_APP: ${EJBCA_LOG_LEVEL_APP:-INFO}
      LOG_LEVEL_SERVER: ${EJBCA_LOG_LEVEL_SERVER:-INFO}
      # simple = allow initial admin without client cert (lab bootstrap only).
      # Switch to true after SuperAdmin is enrolled; see issuing-ca/getting-started.md.
      TLS_SETUP_ENABLED: ${EJBCA_TLS_SETUP_ENABLED:-simple}
    ports:
      - "${EJBCA_HTTP_PORT:-8080}:8080"
      - "${EJBCA_HTTPS_PORT:-8443}:8443"
    networks:
      - pki-internal
      - pki-access

networks:
  pki-internal:
    internal: true
  pki-access:
